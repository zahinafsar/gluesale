services:
  postgres:
    image: postgres:16-alpine
    container_name: stickycart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stickycart
      POSTGRES_PASSWORD: stickycart
      POSTGRES_DB: stickycart
    ports:
      - "5440:5432"
    volumes:
      - stickycart_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickycart -d stickycart"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stickycart_pgdata:

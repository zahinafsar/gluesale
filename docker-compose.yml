services:
  postgres:
    image: postgres:16-alpine
    container_name: gluesale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gluesale
      POSTGRES_PASSWORD: gluesale
      POSTGRES_DB: gluesale
    ports:
      - "5440:5432"
    volumes:
      - gluesale_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gluesale -d gluesale"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gluesale_pgdata:
